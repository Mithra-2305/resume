<!DOCTYPE html>
<html>
<head>
    <title>Student Registration System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    margin: 0;
}
header{
    text-align: center;
    background-color: #b8c5d6;
    color: #2c3e50;
    padding: 15px;
}.container{
    display: flex;
    gap: 20px;
    margin: 20px;
}
.form-box{
    background-color: #dbe4ee;
    padding: 20px;
    border-radius: 8px;
    width: 55%;
}
.table-box{
    background-color: #dbe4ee;
    padding: 20px;
    border-radius: 8px;
    width: 75%;
}
h2{
    color: #2c3e50;
    text-align: center;
}
input,
select{
    width: 100%;
    padding: 8px;
    margin-top: 10px;
    margin-bottom: 10px;
    background-color: white;
    border: 1px solid #09264b;
}
.gender{
    width: auto;
}
button{
    background-color: #b8c5d6;
    color: black;
    border: 0;
}
table{
    width: 100%;
    border-collapse: collapse;
}
th{
    background-color: #b8c5d6;
    color: #2c3e50;
    border:1px solid #09264b;
    padding: 8px;
    text-align: center;
}
td{
    background-color: white;
    border:1px solid #09264b;
    padding: 8px;
    text-align: center;
}
</style>
</head>
<body>
<header>
    <h1>Student Registration System</h1>
    <p>Student Records</p>
</header>
<div class="container">
    <!-- Form Section -->
    <div class="form-box">
        <h2>Registration Form</h2>
        <form onsubmit="result(); return false;">
            <label>Name</label>
            <input type="text" id="name" required>
            <label>Email</label>
            <input type="email" id="email" required>
            <label>Phone Number</label>
            <input type="number" id="phone" required>
            <label>HSC Percentage</label>
            <input type="number" id="hsc" step="0.01" required>
            <label>HSC Group</label>
            <select id="hscgroup">
                <option value="Biology">Biology</option>
                <option value="CS">Computer Science</option>
                <option value="Commerce">Commerce</option>
            </select>
            <label>Gender</label><br><br>
            <input type="radio" class="gender" name="gender" value="Male" required>
            Male
            <input type="radio" class="gender" name="gender" value="Female">
            Female
            <br><br>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </div>

    <!-- Table Section -->
    <div class="table-box">
    <h2>Student Details</h2>
    <table id="studentTable">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>HSC %</th>
            <th>Group</th>
            <th>Gender</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
    </table>
</div>
<script>

function result() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let hsc = document.getElementById("hsc").value;
    let group = document.getElementById("hscgroup").value;
    let gender = document.querySelector('input[name="gender"]:checked').value;
    let table = document.getElementById("studentTable");
    let row = table.insertRow();
    row.insertCell(0).innerHTML = name;
    row.insertCell(1).innerHTML = email;
    row.insertCell(2).innerHTML = phone;
    row.insertCell(3).innerHTML = hsc;
    row.insertCell(4).innerHTML = group;
    row.insertCell(5).innerHTML = gender;
    row.insertCell(6).innerHTML =
    "<button onclick='editRow(this)'>Edit</button>";
    row.insertCell(7).innerHTML =
    "<button onclick='deleteRow(this)'>Delete</button>";
    document.querySelector("form").reset();
}
function deleteRow(btn) {
    let row = btn.parentNode.parentNode;
    row.remove();
}
function editRow(btn) {
    let row = btn.parentNode.parentNode;
    document.getElementById("name").value = row.cells[0].innerHTML;
    document.getElementById("email").value = row.cells[1].innerHTML;
    document.getElementById("phone").value = row.cells[2].innerHTML;
    document.getElementById("hsc").value = row.cells[3].innerHTML;
    document.getElementById("hscgroup").value = row.cells[4].innerHTML;
    if(row.cells[5].innerHTML == "Male"){
        document.getElementsByName("gender")[0].checked = true;
    }
    else{
        document.getElementsByName("gender")[1].checked = true;
    }

    row.remove();
}
</script>
</body>
</html>
